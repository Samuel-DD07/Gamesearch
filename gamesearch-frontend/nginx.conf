server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Bloque le mode iframe pour la sécurité
    add_header X-Frame-Options "SAMEORIGIN";

    # --- ROUTAGE REACT ---
    # Tente de servir le fichier demandé. Si 404, renvoie index.html (Client-Side Routing)
    location / {
        try_files $uri /index.html;
    }

    # --- REVERSE PROXY API ---
    # Intercepte toutes les requêtes commençant par /api et les envoie au backend
    # On retire le /api de l'URL lue car le Spring Boot n'en veut pas (ex: /api/games -> /games)
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- GESTION DU CACHE : INDEX.HTML ---
    # Interdiction FORMELLE de mettre en cache l'index.html
    # C'est lui qui référence les bons fichiers JS/CSS avec leurs hashs
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
    }

    # --- GESTION DU CACHE : ASSETS STATIQUES ---
    # Les fichiers JS/CSS (qui ont un hash unique comme main.0b08d35f.js)
    # peuvent et DOIVENT être mis en cache pendant 1 an pour les performances.
    location ~* \.(?:css|js|webp|avif|jpg|jpeg|gif|png|ico|json|svg|woff2?|eot|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
