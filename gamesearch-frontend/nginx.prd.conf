server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # DNS interne Docker pour la résolution dynamique
    resolver 127.0.0.11 valid=30s;

    # Bloque le mode iframe pour la sécurité
    add_header X-Frame-Options "SAMEORIGIN";

    # --- ROUTAGE REACT ---
    location / {
        try_files $uri /index.html;
    }

    # --- REVERSE PROXY API ---
    location /api/ {
        # Initialisation de la variable AVANT le rewrite
        set $upstream http://gs-backend-prd:8080;

        # Supprime le préfixe /api avant de transmettre
        rewrite ^/api/(.*) /$1 break;
        
        proxy_pass $upstream;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- GESTION DU CACHE : INDEX.HTML ---
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
    }

    # --- GESTION DU CACHE : ASSETS STATIQUES ---
    location ~* \.(?:css|js|webp|avif|jpg|jpeg|gif|png|ico|json|svg|woff2?|eot|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
