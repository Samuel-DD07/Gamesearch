workflow:
  rules:
    # Lance un pipeline pour les merge requests
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

    # Lance aussi un pipeline sur la branche par défaut
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

    # Optionnel : lance sur les tags
    - if: $CI_COMMIT_TAG

stages:
  - build
  - test
  - deploy
  - review
  - dast
  - staging
  - canary
  - production
  - incremental rollout 10%
  - incremental rollout 25%
  - incremental rollout 50%
  - incremental rollout 100%
  - performance
  - cleanup
  - secret-detection

include:
  - template: Auto-DevOps.gitlab-ci.yml

variables:
  GIT_STRATEGY: clone
  SECRET_DETECTION_ENABLED: "true"

sast:
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

secret_detection:
  stage: secret-detection
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Job minimal pour garantir qu'un pipeline MR existe vraiment
mr_ping:
  stage: test
  script:
    - echo "Merge request pipeline is running"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Test de validation d'intégrité du pipeline (Clean Code)
pipeline_integrity_check:
  stage: test
  script:
    - echo "Pipeline state: VALID"
    - exit 0
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG