# Les templates GitLab gèrent SAST, secrets et dépendances sans qu'on ait à maintenir
# ces scripts nous-mêmes. Ils apportent aussi les mises à jour de règles de détection
# automatiquement à chaque nouvelle version de GitLab.
include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.gitlab-ci.yml
  - local: .gitlab/ci/audit.yml
  - local: .gitlab/ci/lint.yml
  - local: .gitlab/ci/test.yml

# Le nom dynamique remplace "Pipeline #1234" par quelque chose de lisible
# dans la liste GitLab, surtout utile quand plusieurs pipelines tournent en même temps.
# les regles sont les suivantes, on effectue le pipeline pour:
# - si c'est une merge request
# - si c'est la branche dev
# - si c'est la branche main
# - si c'est une branche infra
workflow:
  name: '$CI_COMMIT_BRANCH — $CI_COMMIT_SHORT_SHA ($CI_PIPELINE_SOURCE)'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH =~ /^infra\//

variables:
  # Maven télécharge les dépendances dans le workspace plutôt que dans ~/.m2
  # ce qui permet au cache GitLab de les persister entre les jobs.
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"

  # -B = batch mode (pas de prompts interactifs), --no-transfer-progress = logs lisibles en CI.
  MAVEN_CLI_OPTS: "-B --no-transfer-progress --fail-at-end"

# L'ordre des stages reflète le principe "fail fast" : on détecte les problèmes
# les moins coûteux à corriger en premier (sécurité statique, style) avant de
# lancer des opérations longues
stages:
  - audit
  - lint
  - test
  - release

# =============================================================================
# TEMPLATES PARTAGÉS
# Ces jobs cachés (préfixe ".") sont réutilisés via "extends" dans les sous-fichiers.
# =============================================================================

.cache-maven:
  cache:
    key:
      files:
        - gamesearch/pom.xml
    paths:
      - .m2/repository

.cache-node:
  cache:
    key:
      files:
        - gamesearch-frontend/package-lock.json
    paths:
      - gamesearch-frontend/node_modules/

.retry-on-flake:
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - scheduler_failure

.changes-code:
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
      when: always
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - gamesearch/**/*
        - gamesearch-frontend/**/*
        - .gitlab-ci.yml
        - .gitlab/ci/**/*
      when: always
    - when: never

# =============================================================================
# RELEASE
# =============================================================================

release:
  stage: release
  image: node:20-slim
  variables:
    GITLAB_TOKEN: $GITLAB_TOKEN
  before_script:
    - apt-get update && apt-get install -y git
    - npm install -g semantic-release @semantic-release/gitlab @semantic-release/commit-analyzer @semantic-release/release-notes-generator
  script:
    - semantic-release
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual # Sécurité pour ne pas tagger à chaque push sur main sans validation
  allow_failure: true
