include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.gitlab-ci.yml

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH =~ /^infra\//

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  DOCKER_DRIVER: overlay2
  BACKEND_IMAGE: $CI_REGISTRY_IMAGE/gamesearch-backend
  FRONTEND_IMAGE: $CI_REGISTRY_IMAGE/gamesearch-frontend
  TRIVY_VERSION: "0.49.0"
  COMPOSE_VERSION: "2.24.6"

.cache-maven: &cache-maven
  cache:
    key:
      files:
        - gamesearch/pom.xml
    paths:
      - .m2/repository

.cache-node: &cache-node
  cache:
    key:
      files:
        - gamesearch-frontend/package-lock.json
    paths:
      - gamesearch-frontend/node_modules/

stages:
  - audit
  - lint
  - test
  - build
  - smoke
  - security
  - promote

# ==========================================
# STAGE: AUDIT
# ==========================================
secret_detection:
  stage: audit
  extends: .secret-analyzer
  needs: []

sast:
  stage: audit
  needs: []

# ==========================================
# STAGE: LINT
# ==========================================
backend-format:
  stage: lint
  image: maven:3.9.6-eclipse-temurin-21
  needs: []
  <<: *cache-maven
  script:
    - cd gamesearch
    - chmod +x mvnw
    - ./mvnw spotless:check

frontend-lint:
  stage: lint
  image: node:20-alpine
  needs: []
  <<: *cache-node
  script:
    - cd gamesearch-frontend
    - npm ci
    - npm run lint

# ==========================================
# STAGE: TEST
# ==========================================
backend-test:
  stage: test
  image: maven:3.9.6-eclipse-temurin-21
  needs: [backend-format]
  <<: *cache-maven
  script:
    - cd gamesearch
    - chmod +x mvnw
    - ./mvnw clean verify
  artifacts:
    reports:
      junit: gamesearch/target/surefire-reports/TEST-*.xml
    paths:
      - gamesearch/target/site/jacoco/
    expire_in: 1 week

frontend-build:
  stage: test
  image: node:20-alpine
  needs: [frontend-lint]
  <<: *cache-node
  script:
    - cd gamesearch-frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - gamesearch-frontend/build/
    expire_in: 1 week

frontend-test:
  stage: test
  image: node:20-alpine
  needs: [frontend-lint]
  <<: *cache-node
  variables:
    CI: "true"
  script:
    - cd gamesearch-frontend
    - npm ci
    - npm test -- --watchAll=false --coverage --passWithNoTests
  artifacts:
    paths:
      - gamesearch-frontend/coverage/
    expire_in: 1 week

# ==========================================
# STAGE: BUILD — dev uniquement
# main passe par le stage promote (retag sans rebuild)
# ==========================================
docker-build:
  stage: build
  image: docker:24.0.5
  needs: [backend-test, frontend-build, frontend-test]
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker buildx create --use
  script:
    - docker buildx build --platform linux/amd64,linux/arm64
        -t $BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA
        -t $BACKEND_IMAGE:dev-latest
        --push gamesearch
    - docker buildx build --platform linux/amd64,linux/arm64
        -t $FRONTEND_IMAGE:$CI_COMMIT_SHORT_SHA
        -t $FRONTEND_IMAGE:dev-latest
        --push gamesearch-frontend
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"

# ==========================================
# STAGE: SMOKE — dev uniquement
# ==========================================
smoke-test:
  stage: smoke
  image: docker:24.0.5
  needs: [docker-build]
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - mkdir -p /usr/local/lib/docker/cli-plugins
    - wget -qO /usr/local/lib/docker/cli-plugins/docker-compose
        "https://github.com/docker/compose/releases/download/v${COMPOSE_VERSION}/docker-compose-linux-x86_64"
    - chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
  script:
    - docker compose -f gamesearch/docker-compose.yml -f gamesearch/docker-compose.ci.yml up --wait --timeout 120 backend frontend
  after_script:
    - docker compose -f gamesearch/docker-compose.yml -f gamesearch/docker-compose.ci.yml down -v --remove-orphans
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"

# ==========================================
# STAGE: SECURITY — dev uniquement
# ==========================================
.trivy-scan:
  stage: security
  image:
    name: docker.io/aquasec/trivy:${TRIVY_VERSION}
    entrypoint: [""]
  variables:
    TRIVY_USERNAME: "$CI_REGISTRY_USER"
    TRIVY_PASSWORD: "$CI_REGISTRY_PASSWORD"
    TRIVY_AUTH_URL: "$CI_REGISTRY"
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"

container_scanning_backend:
  extends: .trivy-scan
  needs: [smoke-test]
  script:
    - trivy image --exit-code 1 --severity HIGH,CRITICAL --no-progress $BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA

container_scanning_frontend:
  extends: .trivy-scan
  needs: [smoke-test]
  script:
    - trivy image --exit-code 1 --severity HIGH,CRITICAL --no-progress $FRONTEND_IMAGE:$CI_COMMIT_SHORT_SHA

# ==========================================
# STAGE: PROMOTE — main uniquement, déclenchement manuel
# Promeut les images dev-latest vers prod-latest via copie de manifest
# (pas de re-pull des layers, opération instantanée sur le registry)
# ==========================================
docker-promote-prod:
  stage: promote
  image:
    name: gcr.io/go-containerregistry/crane:latest
    entrypoint: [""]
  needs: [backend-test, frontend-build, frontend-test]
  script:
    - crane auth login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - crane copy --all-tags=false $BACKEND_IMAGE:dev-latest $BACKEND_IMAGE:prod-latest
    - crane copy --all-tags=false $FRONTEND_IMAGE:dev-latest $FRONTEND_IMAGE:prod-latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
