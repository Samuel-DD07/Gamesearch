# =============================================================================
# STAGE: TEST
# Les jobs de test utilisent policy: pull sur le cache : ils ne modifient jamais
# les dépendances, laisser le mode pull-push par défaut leur ferait uploader
# le cache inutilement après chaque run.
# interruptible: true est sûr ici car un test annulé ne laisse aucun effet de bord.
# =============================================================================

backend-test:
  stage: test
  image: maven:3.9.6-eclipse-temurin-21
  extends:
    - .retry-on-flake
    - .changes-code
  # On bloque les tests si le format n'est pas valide : inutile de lancer
  # une suite de tests sur du code qui sera de toute façon refusé au merge.
  needs: [backend-format]
  interruptible: true
  timeout: 20 minutes
  cache:
    # extends: .cache-maven serait un doublon ici — on surcharge directement
    # pour ajouter policy: pull sans perdre la clé de cache définie dans le template.
    key:
      files:
        - gamesearch/pom.xml
    paths:
      - .m2/repository
    policy: pull
  script:
    - cd gamesearch
    - chmod +x mvnw
    - ./mvnw $MAVEN_CLI_OPTS clean verify
  artifacts:
    # "always" est intentionnel : sans ça, si un test échoue, GitLab n'uploade pas
    # les rapports JUnit et on perd le détail des échecs dans l'interface.
    when: always
    reports:
      junit: gamesearch/target/surefire-reports/TEST-*.xml
    paths:
      - gamesearch/target/surefire-reports/
      - gamesearch/target/site/jacoco/
    expire_in: 1 week
  # Extrait le pourcentage de couverture du rapport Jacoco pour l'afficher
  # dans le badge et sur la MR sans plugin supplémentaire.
  coverage: '/Total.*?([0-9]{1,3})%/'

frontend-build:
  stage: test
  image: node:20-alpine
  extends:
    - .retry-on-flake
    - .changes-code
  # Le build ne sert à rien si le lint échoue : un code qui ne passe pas ESLint
  # ne sera jamais mergé, autant ne pas gaspiller les ressources.
  needs: [frontend-lint]
  interruptible: true
  timeout: 10 minutes
  cache:
    key:
      files:
        - gamesearch-frontend/package-lock.json
    paths:
      - gamesearch-frontend/node_modules/
    policy: pull
  script:
    - cd gamesearch-frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - gamesearch-frontend/build/
    expire_in: 1 week

frontend-test:
  stage: test
  image: node:20-alpine
  extends:
    - .retry-on-flake
    - .changes-code
  needs: [frontend-lint]
  interruptible: true
  timeout: 10 minutes
  cache:
    key:
      files:
        - gamesearch-frontend/package-lock.json
    paths:
      - gamesearch-frontend/node_modules/
    policy: pull
  variables:
    # CI=true force Jest en mode non-interactif et traite les warnings comme des erreurs,
    # ce qui évite des faux positifs silencieux sur les pipelines.
    CI: "true"
  script:
    - cd gamesearch-frontend
    - npm ci
    - npm test -- --watchAll=false --coverage --passWithNoTests
  artifacts:
    when: always
    reports:
      # jest-junit génère ce fichier — à configurer dans jest.config.js si ce n'est pas déjà fait.
      junit: gamesearch-frontend/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: gamesearch-frontend/coverage/cobertura-coverage.xml
    paths:
      - gamesearch-frontend/coverage/
    expire_in: 1 week
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
