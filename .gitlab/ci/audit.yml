# =============================================================================
# STAGE: AUDIT
# Ces trois jobs démarrent immédiatement (needs: []) en parallèle des jobs lint.
# Ils ne bloquent pas le reste du pipeline car les templates GitLab les configurent
# avec allow_failure: true — ce sont des signaux, pas des portes bloquantes.
# =============================================================================

secret_detection:
  stage: audit
  extends: .secret-analyzer
  needs: []
  interruptible: true
  timeout: 10 minutes

sast:
  stage: audit
  needs: []
  interruptible: true
  timeout: 10 minutes

# Le template inclus tourne par défaut dans le stage "test". On le remonte en "audit"
# pour grouper tous les scans statiques ensemble et garder l'ordre logique du pipeline.
dependency_scanning:
  stage: audit
  needs: []
  interruptible: true
  timeout: 10 minutes
