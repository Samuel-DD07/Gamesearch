# =============================================================================
# STAGE: SECURITY — branche dev uniquement
# Les scans Trivy tournent sur les images construites et validées par le smoke test.
# On scanne les images par SHA court (pas dev-latest) pour garantir qu'on analyse
# exactement ce qui vient d'être buildé, pas une image poussée par un pipeline précédent.
#
# --exit-code 1 fait échouer le job si une vulnérabilité HIGH ou CRITICAL est trouvée.
# C'est une porte de qualité volontaire : on ne merge pas avec des failles connues.
# =============================================================================

# Template partagé entre les deux scans. On fixe la version de l'image
# pour que les résultats soient comparables d'un pipeline à l'autre
# et qu'une mise à jour de la base CVE ne génère pas de faux positifs inattendus.
.trivy-scan:
  stage: security
  image:
    name: docker.io/aquasec/trivy:${TRIVY_VERSION}
    entrypoint: [""]
  variables:
    TRIVY_USERNAME: "$CI_REGISTRY_USER"
    TRIVY_PASSWORD: "$CI_REGISTRY_PASSWORD"
    TRIVY_AUTH_URL: "$CI_REGISTRY"
    # Trivy télécharge ~200 Mo de base CVE à chaque run sans ce cache.
    # Sur 10 pipelines/jour c'est 2 Go de trafic inutile et plusieurs minutes perdues.
    TRIVY_CACHE_DIR: .trivy-cache
  cache:
    key: trivy-db-$TRIVY_VERSION
    paths:
      - .trivy-cache/
  timeout: 10 minutes
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"

container_scanning_backend:
  extends: .trivy-scan
  needs: [smoke-test]
  script:
    - trivy image --exit-code 1 --severity HIGH,CRITICAL --no-progress
        --format sarif --output trivy-backend.sarif
        $BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA
  artifacts:
    when: always
    reports:
      # Le format SARIF est intégré nativement dans le Security Dashboard de GitLab,
      # ce qui évite d'avoir à lire des JSON bruts pour comprendre les vulnérabilités.
      sast: trivy-backend.sarif
    expire_in: 1 week

container_scanning_frontend:
  extends: .trivy-scan
  needs: [smoke-test]
  script:
    - trivy image --exit-code 1 --severity HIGH,CRITICAL --no-progress
        --format sarif --output trivy-frontend.sarif
        $FRONTEND_IMAGE:$CI_COMMIT_SHORT_SHA
  artifacts:
    when: always
    reports:
      sast: trivy-frontend.sarif
    expire_in: 1 week
