# =============================================================================
# STAGE: PROMOTE — branche main uniquement, déclenchement manuel
# On copie le manifeste de dev-latest vers prod-latest directement dans le registry
# via crane. Aucun layer n'est re-téléchargé ni rebuilté : opération instantanée
# qui garantit que l'image en prod est bit-for-bit identique à celle validée en dev.
#
# resource_group: production empêche deux promotions simultanées — sans ça, deux
# opérateurs pourraient déclencher le job en même temps et créer une race condition
# sur prod-latest.
#
# interruptible: false — on ne veut pas annuler une copie de manifeste en cours,
# le registry se retrouverait dans un état indéterminé.
# =============================================================================

docker-promote-prod:
  stage: promote
  image:
    # TODO: remplacer :debug par une version explicite (ex: v0.19.1) pour la reproductibilité.
    # Commande : docker buildx imagetools inspect gcr.io/go-containerregistry/crane:debug | grep Digest
    name: gcr.io/go-containerregistry/crane:debug
    entrypoint: [""]
  # On rejoue les mêmes gates que docker-build pour s'assurer que les tests
  # passent bien sur main avant d'autoriser la promotion, même en cas de merge forcé.
  needs: [backend-test, frontend-build, frontend-test]
  timeout: 5 minutes
  resource_group: production
  environment:
    name: production
    url: https://gamesearch.basteproductions.fr
  script:
    - crane auth login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - crane copy --all-tags=false $BACKEND_IMAGE:dev-latest $BACKEND_IMAGE:prod-latest
    - crane copy --all-tags=false $FRONTEND_IMAGE:dev-latest $FRONTEND_IMAGE:prod-latest
  rules:
    # Manuel par choix : la promotion en production est une décision humaine consciente,
    # pas un automatisme. On veut qu'un développeur valide explicitement ce déploiement.
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
