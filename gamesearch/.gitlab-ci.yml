# Templates de sécurité GitLab :
# - SAST : Static Application Security Testing (analyse du code source pour trouver des vulnérabilités)
# - Secret-Detection : Recherche des secrets, clés API, ou mots de passe exposés dans le commit
# - Dependency-Scanning : Analyse des dépendances (pom.xml, package.json) pour détecter les failles de sécurité connues
include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.gitlab-ci.yml

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "main"

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_VERIFY: 1
  DOCKER_CERT_PATH: "/certs/client"
  # Chemins exacts pour registry
  BACKEND_IMAGE: $CI_REGISTRY_IMAGE/gamesearch-backend
  FRONTEND_IMAGE: $CI_REGISTRY_IMAGE/gamesearch-frontend
  TRIVY_VERSION: "0.49.0"
  COMPOSE_VERSION: "2.24.6"

.cache-maven: &cache-maven
  cache:
    key:
      files:
        - pom.xml
    paths:
      - .m2/repository

.cache-node: &cache-node
  cache:
    key:
      files:
        - gamesearch-frontend/package-lock.json
    paths:
      - gamesearch-frontend/node_modules/

stages:
  - audit          # Sécurité statique (Secrets, SAST)
  - lint           # Formatage et Qualité (Spotless, ESLint)
  - test           # Tests unitaires et Couverture (JaCoCo)
  - build          # Packaging Multi-Arch (Docker Buildx)
  - smoke          # Validation démarrage (docker-compose up --wait)
  - security       # Scan de vulnérabilités (Trivy)

# ==========================================
# STAGE: AUDIT
# ==========================================
secret_detection:
  stage: audit
  extends: .secret-analyzer
  needs: []

sast:
  stage: audit
  needs: []

# ==========================================
# STAGE: LINT
# ==========================================
# Vérification de la mise en forme du code Backend avec Spotless (Java)
# Spotless assure un style de code homogène entre tous les contributeurs.
backend-format:
  stage: lint
  image: maven:3.9.6-eclipse-temurin-21
  needs: []
  <<: *cache-maven
  script:
    - chmod +x mvnw
    - ./mvnw spotless:check

# Analyse statique du code Frontend avec ESLint
# Permet de détecter les mauvaises pratiques et les erreurs de syntaxe JavaScript/React.
frontend-lint:
  stage: lint
  image: node:20-alpine
  needs: []
  <<: *cache-node
  script:
    - cd gamesearch-frontend
    - npm ci
    - npm run lint

# ==========================================
# STAGE: TEST
# ==========================================
# Exécution des tests unitaires, calcul de la couverture de code avec JaCoCo.
# - JaCoCo (Jacob Code Coverage) : Mesure le pourcentage de code testé par les tests unitaires.
# - jacoco:check : Fait échouer le pipeline si la couverture est inférieure au seuil (ex: 80%).
backend-test:
  stage: test
  image: maven:3.9.6-eclipse-temurin-21
  needs: [backend-format]
  <<: *cache-maven
  script:
    - chmod +x mvnw
    - ./mvnw clean test
    - ./mvnw jacoco:report
    - ./mvnw jacoco:check # Seuil 80% configuré dans le pom.xml TODO : a remettre a 0.80 quand on aura plus de tests
  artifacts:
    reports:
      junit: target/surefire-reports/TEST-*.xml
    paths:
      - target/site/jacoco/
    expire_in: 1 week

frontend-build:
  stage: test
  image: node:20-alpine
  needs: [frontend-lint]
  <<: *cache-node
  script:
    - cd gamesearch-frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - gamesearch-frontend/build/
    expire_in: 1 week

frontend-test:
  stage: test
  image: node:20-alpine
  needs: [frontend-lint]
  <<: *cache-node
  variables:
    CI: "true"
  script:
    - cd gamesearch-frontend
    - npm ci
    - npm test -- --watchAll=false --coverage
  artifacts:
    paths:
      - gamesearch-frontend/coverage/
    expire_in: 1 week

# ==========================================
# STAGE: BUILD (Docker Multi-Arch)
# ==========================================
# Construction et publication des images Docker (Multi-architecture AMD64/ARM64).
# Prépare les images prêtes à être déployées sur différents environnements de serveurs.
docker-build:
  stage: build
  image: docker:24.0.5
  needs: [backend-test, frontend-build]
  services:
    - name: docker:24.0.5-dind
      variables:
        DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker buildx create --use
  script:
    # Build Backend
    - docker buildx build --platform linux/amd64,linux/arm64
        -t $BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA
        -t $BACKEND_IMAGE:$ENV_TAG
        --push .
    # Build Frontend
    - cd gamesearch-frontend
    - docker buildx build --platform linux/amd64,linux/arm64
        -t $FRONTEND_IMAGE:$CI_COMMIT_SHORT_SHA
        -t $FRONTEND_IMAGE:$ENV_TAG
        --push .
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
      variables:
        ENV_TAG: "dev-latest"
    - if: $CI_COMMIT_BRANCH == "main"
      variables:
        ENV_TAG: "prod-latest"

# ==========================================
# STAGE: SMOKE
# ==========================================
smoke-test:
  stage: smoke
  image: docker:24.0.5
  services:
    - name: docker:24.0.5-dind
      variables:
        DOCKER_TLS_CERTDIR: "/certs"
  needs: [docker-build]
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - mkdir -p /usr/local/lib/docker/cli-plugins
    - wget -qO /usr/local/lib/docker/cli-plugins/docker-compose
        "https://github.com/docker/compose/releases/download/v${COMPOSE_VERSION}/docker-compose-linux-x86_64"
    - chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
  script:
    - docker compose -f docker-compose.yml -f docker-compose.ci.yml up --wait --timeout 120 backend frontend
  after_script:
    - docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v --remove-orphans
  rules:
    - if: $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "main"

# ==========================================
# STAGE: SECURITY (Trivy Scan)
# ==========================================
.trivy-scan:
  stage: security
  image:
    name: docker.io/aquasec/trivy:${TRIVY_VERSION}
    entrypoint: [""]
  variables:
    TRIVY_USERNAME: "$CI_REGISTRY_USER"
    TRIVY_PASSWORD: "$CI_REGISTRY_PASSWORD"
    TRIVY_AUTH_URL: "$CI_REGISTRY"
  rules:
    - if: $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "main"

container_scanning_backend:
  extends: .trivy-scan
  needs: [smoke-test]
  script:
    - trivy image --exit-code 1 --severity HIGH,CRITICAL --no-progress $BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA

container_scanning_frontend:
  extends: .trivy-scan
  needs: [smoke-test]
  script:
    - trivy image --exit-code 1 --severity HIGH,CRITICAL --no-progress $FRONTEND_IMAGE:$CI_COMMIT_SHORT_SHA
