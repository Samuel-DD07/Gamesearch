# Templates de sécurité GitLab :
# - SAST : Static Application Security Testing (analyse du code source pour trouver des vulnérabilités)
# - Secret-Detection : Recherche des secrets, clés API, ou mots de passe exposés dans le commit
# - Dependency-Scanning : Analyse des dépendances (pom.xml, package.json) pour détecter les failles de sécurité connues
include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.gitlab-ci.yml

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  # Chemins exacts pour registry
  BACKEND_IMAGE: $CI_REGISTRY_IMAGE/gamesearch-backend
  FRONTEND_IMAGE: $CI_REGISTRY_IMAGE/gamesearch-frontend
  TRIVY_VERSION: "0.49.0"

cache:
  paths:
    - .m2/repository
    - frontend/node_modules/

stages:
  - audit          # Sécurité statique (Secrets, SAST)
  - lint           # Formatage et Qualité (Spotless, ESLint)
  - test           # Tests unitaires et Couverture (JaCoCo)
  - modernization  # Validation Architecture (ArchUnit)
  - build          # Packaging Multi-Arch (Docker Buildx)
  - security       # Scan de vulnérabilités (Trivy)

# ==========================================
# STAGE: AUDIT
# ==========================================
secret_detection:
  stage: audit
  extends: .secret-analyzer
  rules:
    - if: $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "main"

sast:
  stage: audit
  rules:
    - if: $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "main"

# ==========================================
# STAGE: LINT
# ==========================================
# Vérification de la mise en forme du code Backend avec Spotless (Java)
# Spotless assure un style de code homogène entre tous les contributeurs.
backend-format:
  stage: lint
  image: maven:3.9.6-eclipse-temurin-21
  script:
    - chmod +x mvnw
    - ./mvnw spotless:check
  rules:
    - if: $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "main"

# Analyse statique du code Frontend avec ESLint
# Permet de détecter les mauvaises pratiques et les erreurs de syntaxe JavaScript/React.
frontend-lint:
  stage: lint
  image: node:20-alpine
  script:
    - cd frontend
    - npm ci
    - npm run lint
  rules:
    - if: $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "main"

# ==========================================
# STAGE: TEST
# ==========================================
# Exécution des tests unitaires, calcul de la couverture de code avec JaCoCo.
# - JaCoCo (Jacob Code Coverage) : Mesure le pourcentage de code testé par les tests unitaires.
# - jacoco:check : Fait échouer le pipeline si la couverture est inférieure au seuil (ex: 80%).
backend-test:
  stage: test
  image: maven:3.9.6-eclipse-temurin-21
  script:
    - chmod +x mvnw
    - ./mvnw clean test
    - ./mvnw jacoco:report
    - ./mvnw jacoco:check # Seuil 80% configuré dans le pom.xml
  artifacts:
    reports:
      junit: target/surefire-reports/TEST-*.xml
    paths:
      - target/site/jacoco/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "main"

# Validation de l'architecture logicielle avec ArchUnit.
# Garantit que les couches (Layers) respectent la Clean Architecture et que l'usage des Records Java 21 est maintenu.
architecture-modernization:
  stage: modernization
  image: maven:3.9.6-eclipse-temurin-21
  script:
    - chmod +x mvnw
    # Exécution ciblée des tests ArchUnit pour garantir l'usage de Java 21 Records 
    # et le respect de la Clean Architecture.
    - ./mvnw test -Dtest="*Arch*"
  rules:
    - if: $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "main"

# ==========================================
# STAGE: BUILD (Docker Multi-Arch)
# ==========================================
# Construction et publication des images Docker (Multi-architecture AMD64/ARM64).
# Prépare les images prêtes à être déployées sur différents environnements de serveurs.
docker-build:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker buildx create --use
  script:
    # Build Backend
    - docker buildx build --platform linux/amd64,linux/arm64 
        -t $BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA 
        -t $BACKEND_IMAGE:latest 
        --push .
    # Build Frontend
    - cd frontend
    - docker buildx build --platform linux/amd64,linux/arm64 
        -t $FRONTEND_IMAGE:$CI_COMMIT_SHORT_SHA 
        -t $FRONTEND_IMAGE:latest 
        --push .
  rules:
    - if: $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "main"

# ==========================================
# STAGE: SECURITY (Trivy Scan)
# ==========================================
# Analyse de l'image Backend avec Trivy.
# Trivy scanne l'image Docker finale pour détecter des vulnérabilités de sécurité dans l'OS et les bibliothèques.
container_scanning:
  stage: security
  image:
    name: docker.io/aquasec/trivy:${TRIVY_VERSION}
    entrypoint: [""]
  variables:
    TRIVY_USERNAME: "$CI_REGISTRY_USER"
    TRIVY_PASSWORD: "$CI_REGISTRY_PASSWORD"
    TRIVY_AUTH_URL: "$CI_REGISTRY"
  script:
    # Analyse de l'image Backend
    - trivy image --exit-code 1 --severity HIGH,CRITICAL --no-progress $BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA
  rules:
    - if: $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "main"
