name: gamesearch-prd

networks:
  gamesearch_frontend:
    internal: false
  gamesearch_backend:
    internal: true
  gamesearch_data:
    internal: true
  edge:
    external: true

services:
  # ==========================================
  # BASE DE DONNÉES
  # ==========================================
  gs-postgres-prd:
    image: postgres:16-alpine
    container_name: gamesearch-postgres-prd
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_DB: gamesearch
      POSTGRES_USER: gamesearch_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ChangeMe123!}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gamesearch_data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamesearch_user -d gamesearch"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # MESSAGING (KAFKA - KRaft Mode)
  # ==========================================
  gs-kafka-prd:
    image: confluentinc/cp-kafka:7.6.0
    container_name: gamesearch-kafka-prd
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://gs-kafka-prd:9092
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@gs-kafka-prd:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - gamesearch_backend
      - gamesearch_data

  # ==========================================
  # BACKEND (Spring Boot)
  # ==========================================
  gs-backend-prd:
    image: registry.basteproductions.fr/epita_dev_1/fullstack/gamesearch-backend:prod-latest
    container_name: gamesearch-backend-prd
    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://gs-postgres-prd:5432/gamesearch
      - SPRING_DATASOURCE_USERNAME=gamesearch_user
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-ChangeMe123!}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=gs-kafka-prd:9092
      - JWT_SECRET=${JWT_SECRET:-VerySecretKeyForJwtAuthenticationPleaseChange!}
      - JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS:-86400000}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    networks:
      - edge
      - gamesearch_backend
      - gamesearch_data
    depends_on:
      gs-postgres-prd:
        condition: service_healthy
      gs-kafka-prd:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=edge"
      # API générale
      - "traefik.http.routers.gamesearch-api-prd.rule=Host(`api.gamesearch.basteproductions.fr`)"
      - "traefik.http.routers.gamesearch-api-prd.entrypoints=websecure"
      - "traefik.http.routers.gamesearch-api-prd.tls.certresolver=letsencrypt"
      - "traefik.http.routers.gamesearch-api-prd.middlewares=crowdsec-bouncer@file"
      - "traefik.http.routers.gamesearch-api-prd.service=gamesearch-api-prd"
      - "traefik.http.services.gamesearch-api-prd.loadbalancer.server.port=8080"
      
      # Rate Limiting pour l'ingestion partenaires (sécurité)
      - "traefik.http.middlewares.partner-ratelimit.ratelimit.average=10"
      - "traefik.http.middlewares.partner-ratelimit.ratelimit.burst=20"
      - "traefik.http.routers.gamesearch-partner-prd.rule=Host(`api.gamesearch.basteproductions.fr`) && PathPrefix(`/partner/games`)"
      - "traefik.http.routers.gamesearch-partner-prd.entrypoints=websecure"
      - "traefik.http.routers.gamesearch-partner-prd.tls.certresolver=letsencrypt"
      - "traefik.http.routers.gamesearch-partner-prd.middlewares=crowdsec-bouncer@file,partner-ratelimit"
      - "traefik.http.routers.gamesearch-partner-prd.service=gamesearch-partner-prd"
      - "traefik.http.services.gamesearch-partner-prd.loadbalancer.server.port=8080"

      # Observabilité Prometheus
      - "prometheus.scrape=true"
      - "prometheus.port=8080"
      - "prometheus.path=/actuator/prometheus"


  # ==========================================
  # FRONTEND (React)
  # ==========================================
  gs-frontend-prd:
    image: registry.basteproductions.fr/epita_dev_1/fullstack/gamesearch-frontend:prod-latest
    container_name: gamesearch-frontend-prd
    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - REACT_APP_API_URL=https://api.gamesearch.basteproductions.fr
    networks:
      - edge
      - gamesearch_frontend
      - gamesearch_backend
    volumes:
      - ../../gamesearch-frontend/nginx.prd.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=edge"
      - "traefik.http.routers.gamesearch-web-prd.rule=Host(`gamesearch.basteproductions.fr`)"
      - "traefik.http.routers.gamesearch-web-prd.entrypoints=websecure"
      - "traefik.http.routers.gamesearch-web-prd.tls.certresolver=letsencrypt"
      - "traefik.http.routers.gamesearch-web-prd.middlewares=crowdsec-bouncer@file"
      - "traefik.http.services.gamesearch-web-prd.loadbalancer.server.port=80"


volumes:
  postgres_data:
    name: gamesearch_postgres_data_prd
  kafka_data:
    name: gamesearch_kafka_data_prd
